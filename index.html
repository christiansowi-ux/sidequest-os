<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#07080d" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Sidequest OS" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<title>Sidequest OS — Mission Control</title>
<style>
  /* ================= DESIGN TOKENS ================= */
  :root {
    --bg: #07080d;
    --panel: #0d1017;
    --panel-2: #12161f;
    --elev: #161b26;
    --field: #0a0d14;
    --line: #1c212e;
    --line-2: #2a3040;
    --txt: #e9edf4;
    --sub: #98a2b8;
    --dim: #5b6478;
    --acc: #2ce0a7;
    --acc-2: #6d5df0;
    --acc-dim: #2ce0a71f;
    --blue: #4c8dff;
    --amber: #f0a832;
    --red: #f25767;
    --green: #2bc182;
    --r-sm: 8px; --r-md: 12px; --r-lg: 16px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--txt);
    line-height: 1.5;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  .num { font-variant-numeric: tabular-nums; }
  svg { display: block; }

  /* ================= APP FRAME ================= */
  #app {
    position: relative;
    max-width: 480px;
    margin: 0 auto;
    height: 100dvh;
    display: none;
    flex-direction: column;
    background:
      radial-gradient(560px 300px at 50% -12%, #131a2b, transparent 65%),
      var(--bg);
    overflow: hidden;
  }
  @media (min-width: 500px) {
    body { background: #04050a; }
    #app, #gate { border-left: 1px solid var(--line); border-right: 1px solid var(--line); box-shadow: 0 0 140px -30px #000; }
  }

  /* ================= TOP BAR ================= */
  .topbar {
    flex: 0 0 auto;
    padding: calc(var(--safe-top) + 12px) 18px 10px;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    position: relative; z-index: 5;
  }
  .brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .brand .mark {
    width: 32px; height: 32px; border-radius: 9px; flex: 0 0 auto;
    background: linear-gradient(135deg, var(--acc), var(--acc-2));
    display: grid; place-items: center;
    box-shadow: 0 4px 14px -4px #2ce0a766;
  }
  .brand .mark svg { width: 15px; height: 15px; }
  .brand .b-name { font-weight: 800; font-size: 14px; letter-spacing: -0.2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .brand .b-sys { font-size: 9.5px; font-weight: 700; letter-spacing: 1.6px; color: var(--dim); text-transform: uppercase; margin-top: 1px; }
  .top-right { display: flex; align-items: center; gap: 8px; flex: 0 0 auto; }
  .sync-pill {
    display: flex; align-items: center; gap: 6px;
    font-size: 10.5px; font-weight: 700; letter-spacing: .4px;
    padding: 5px 10px; border-radius: 999px;
    border: 1px solid var(--line); background: var(--panel); color: var(--sub);
    cursor: pointer;
  }
  .sync-pill .sdot { width: 6px; height: 6px; border-radius: 50%; background: var(--amber); }
  .sync-pill.live .sdot { background: var(--green); box-shadow: 0 0 7px #2bc18299; }
  .sync-pill.live { color: #9fd8bf; border-color: #2bc18233; }
  .me-chip {
    width: 32px; height: 32px; border-radius: 9px; cursor: pointer;
    display: grid; place-items: center;
    font-size: 12.5px; font-weight: 800;
    border: 1px solid var(--line);
  }

  /* ================= VIEW ================= */
  #view {
    flex: 1 1 auto; overflow-y: auto; overflow-x: hidden;
    padding: 4px 16px 118px;
    -webkit-overflow-scrolling: touch;
  }
  #view::-webkit-scrollbar { width: 0; }
  .view-anim { animation: viewIn .3s cubic-bezier(.2,.7,.3,1); }
  @keyframes viewIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  .page-title { font-size: 23px; font-weight: 800; letter-spacing: -0.5px; margin: 10px 0 3px; }
  .page-sub { color: var(--sub); font-size: 13px; margin-bottom: 16px; }
  .kicker {
    display: flex; align-items: center; justify-content: space-between;
    margin: 24px 2px 10px;
  }
  .kicker h3 { font-size: 11px; font-weight: 800; letter-spacing: 1.4px; text-transform: uppercase; color: var(--dim); }
  .kicker .k-link { font-size: 12px; color: var(--acc); font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 3px; }
  .kicker .k-link svg { width: 13px; height: 13px; }
  .kicker .k-meta { font-size: 11.5px; color: var(--dim); font-weight: 600; }

  /* ================= HERO ================= */
  .hero { margin: 8px 0 0; }
  .hero .hi { color: var(--dim); font-size: 12.5px; font-weight: 600; letter-spacing: .3px; }
  .hero .big { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; line-height: 1.2; margin-top: 3px; }

  /* ================= KPI GRID ================= */
  .kpis { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px; }
  .kpi {
    background: linear-gradient(180deg, var(--panel-2), var(--panel));
    border: 1px solid var(--line); border-radius: var(--r-lg);
    padding: 14px 15px 12px; cursor: pointer;
    transition: border-color .15s, transform .1s;
    position: relative;
  }
  .kpi:active { transform: scale(.98); border-color: var(--line-2); }
  .kpi .k-ico { position: absolute; top: 13px; right: 13px; color: var(--dim); }
  .kpi .k-ico svg { width: 15px; height: 15px; }
  .kpi .k-num { font-size: 27px; font-weight: 800; letter-spacing: -1px; line-height: 1.1; }
  .kpi .k-lbl { color: var(--sub); font-size: 12px; font-weight: 600; margin-top: 2px; }
  .kpi .k-sub { color: var(--dim); font-size: 10.5px; font-weight: 600; margin-top: 5px; letter-spacing: .2px; }

  /* ================= MOMENTUM ================= */
  .momentum {
    display: flex; align-items: center; gap: 18px;
    background: linear-gradient(180deg, var(--panel-2), var(--panel));
    border: 1px solid var(--line); border-radius: var(--r-lg);
    padding: 16px;
  }
  .ring-wrap { position: relative; width: 64px; height: 64px; flex: 0 0 auto; }
  .ring-wrap .ring-val { position: absolute; inset: 0; display: grid; place-items: center; font-size: 14px; font-weight: 800; }
  .mom-rows { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 9px; }
  .mom-row { display: flex; align-items: center; gap: 10px; }
  .mom-row .m-lbl { font-size: 11.5px; font-weight: 650; color: var(--sub); width: 68px; flex: 0 0 auto; }
  .mom-row .m-bar { flex: 1; height: 4px; border-radius: 99px; background: #ffffff0d; overflow: hidden; }
  .mom-row .m-fill { height: 100%; border-radius: 99px; }
  .mom-row .m-val { font-size: 11px; font-weight: 700; color: var(--dim); width: 22px; text-align: right; flex: 0 0 auto; }

  /* ================= CARDS / ROWS ================= */
  .card {
    background: linear-gradient(180deg, var(--panel-2), var(--panel));
    border: 1px solid var(--line); border-radius: var(--r-lg);
    padding: 14px; margin-bottom: 10px; cursor: pointer;
    transition: border-color .15s, transform .1s;
  }
  .card:active { transform: scale(.985); border-color: var(--line-2); }
  .card.static { cursor: default; }
  .card.static:active { transform: none; border-color: var(--line); }

  .tile {
    width: 42px; height: 42px; border-radius: 11px; flex: 0 0 auto;
    display: grid; place-items: center; font-size: 19px;
    background: var(--elev); border: 1px solid var(--line);
  }
  .proj { display: flex; gap: 12px; align-items: flex-start; }
  .proj .body { flex: 1; min-width: 0; }
  .proj .row1 { display: flex; align-items: center; gap: 8px; }
  .proj .pname { font-weight: 700; font-size: 14.5px; letter-spacing: -0.2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
  .proj .ptype { color: var(--dim); font-size: 11.5px; font-weight: 600; margin-top: 1px; }
  .proj .pbar { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
  .proj .pbar .bar { flex: 1; }
  .proj .pmeta { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }

  .chip {
    flex: 0 0 auto; font-size: 9.5px; font-weight: 800; padding: 3px 7px; border-radius: 6px;
    text-transform: uppercase; letter-spacing: .7px; border: 1px solid transparent;
  }
  .chip.live { color: var(--green); background: #2bc18214; border-color: #2bc18230; }
  .chip.doing { color: var(--blue); background: #4c8dff14; border-color: #4c8dff30; }
  .chip.idea { color: var(--amber); background: #f0a83212; border-color: #f0a8322e; }
  .chip.paused { color: var(--dim); background: #ffffff08; border-color: var(--line); }
  .chip.venture { color: #a89bff; background: #6d5df018; border-color: #6d5df038; }

  .bar { height: 5px; border-radius: 99px; background: #ffffff0d; overflow: hidden; }
  .fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--acc), var(--acc-2)); width: 0; transition: width .7s cubic-bezier(.2,.8,.2,1); }
  .pct { font-size: 11.5px; font-weight: 700; color: var(--sub); flex: 0 0 auto; }

  /* monogram avatars */
  .avx { border-radius: 8px; display: grid; place-items: center; font-weight: 800; flex: 0 0 auto; }
  .av-stack { display: flex; }
  .av-stack .avx { margin-right: -6px; border: 2px solid var(--panel); border-radius: 8px; }

  /* ================= FILTERS / SEGMENTED ================= */
  .filters { display: flex; gap: 7px; overflow-x: auto; padding: 2px 0 6px; margin-bottom: 4px; scrollbar-width: none; }
  .filters::-webkit-scrollbar { display: none; }
  .fchip {
    flex: 0 0 auto; font-size: 12px; font-weight: 700; padding: 7px 13px; border-radius: 9px;
    border: 1px solid var(--line); background: var(--panel); color: var(--sub); cursor: pointer;
    transition: all .13s; letter-spacing: .2px;
  }
  .fchip.on { background: var(--acc-dim); border-color: #2ce0a74d; color: var(--acc); }

  .seg { display: flex; background: var(--panel); border: 1px solid var(--line); border-radius: var(--r-md); padding: 3px; margin: 2px 0 14px; gap: 3px; }
  .seg button {
    flex: 1; border: none; background: transparent; color: var(--sub);
    font-family: inherit; font-weight: 700; font-size: 12.5px; padding: 9px 4px;
    border-radius: 9px; cursor: pointer; transition: all .14s;
  }
  .seg button .cnt { display: inline-block; min-width: 17px; margin-left: 5px; font-size: 10.5px; padding: 1px 5px; border-radius: 99px; background: #ffffff10; font-variant-numeric: tabular-nums; }
  .seg button.on { background: var(--elev); color: var(--txt); box-shadow: inset 0 0 0 1px var(--line-2); }
  .seg button.on .cnt { background: var(--acc-dim); color: var(--acc); }

  /* ================= TASKS ================= */
  .task { display: flex; gap: 11px; align-items: flex-start; }
  .task .tbody { flex: 1; min-width: 0; }
  .task .ttitle { font-weight: 650; font-size: 14px; letter-spacing: -0.1px; line-height: 1.4; }
  .task .tmeta { display: flex; align-items: center; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .prio-chip { font-size: 9.5px; font-weight: 800; padding: 3px 6px; border-radius: 5px; letter-spacing: .5px; flex: 0 0 auto; margin-top: 2px; }
  .prio-chip.h { color: var(--red); background: #f2576714; border: 1px solid #f2576733; }
  .prio-chip.m { color: var(--amber); background: #f0a83212; border: 1px solid #f0a8322e; }
  .prio-chip.l { color: var(--dim); background: #ffffff08; border: 1px solid var(--line); }
  .tag {
    font-size: 10.5px; font-weight: 650; padding: 3px 8px; border-radius: 6px;
    background: #ffffff08; color: var(--sub); border: 1px solid var(--line);
    display: inline-flex; align-items: center; gap: 5px;
  }
  .tag.pj { color: #a89bff; background: #6d5df012; border-color: #6d5df02e; }
  .tag.me { color: var(--acc); background: var(--acc-dim); border-color: #2ce0a740; }
  .task .move { display: flex; gap: 6px; margin-top: 10px; }
  .mbtn {
    flex: 1; border: 1px solid var(--line); background: var(--field); color: var(--sub);
    font-family: inherit; font-weight: 700; font-size: 12px; padding: 8px; border-radius: 8px;
    cursor: pointer; transition: all .12s;
  }
  .mbtn:active { transform: scale(.96); }
  .mbtn.done { color: var(--acc); border-color: #2ce0a73d; }

  /* ================= TEAM ================= */
  .member { display: flex; gap: 12px; align-items: center; }
  .member .m-body { flex: 1; min-width: 0; }
  .member .mname { font-weight: 700; font-size: 14.5px; }
  .member .mrole { color: var(--dim); font-size: 11.5px; font-weight: 600; margin-top: 1px; }
  .member .mtags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
  .member .m-count { text-align: center; flex: 0 0 auto; padding-left: 8px; }
  .member .m-count b { display: block; font-size: 17px; font-weight: 800; color: var(--acc); }
  .member .m-count span { font-size: 9.5px; color: var(--dim); font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }

  .meter { display: flex; align-items: center; gap: 10px; padding: 7px 0; }
  .meter .mt-lbl { font-size: 12px; font-weight: 600; color: var(--sub); flex: 1; min-width: 0; }
  .meter .mt-bar { width: 88px; height: 4px; border-radius: 99px; background: #ffffff0d; overflow: hidden; flex: 0 0 auto; }
  .meter .mt-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--acc), var(--acc-2)); }
  .meter .mt-val { font-size: 11px; font-weight: 700; color: var(--dim); width: 24px; text-align: right; flex: 0 0 auto; }

  /* ================= ACTIVITY ================= */
  .act-row { display: flex; gap: 11px; align-items: flex-start; padding: 11px 2px; border-bottom: 1px solid var(--line); }
  .act-row:last-child { border-bottom: none; }
  .act-body { flex: 1; min-width: 0; font-size: 13px; color: var(--sub); line-height: 1.45; }
  .act-body b { color: var(--txt); font-weight: 700; }
  .act-time { font-size: 10.5px; color: var(--dim); font-weight: 600; margin-top: 2px; }

  /* ================= EMPTY ================= */
  .empty { text-align: center; padding: 40px 24px; color: var(--dim); }
  .empty .e-ico { width: 42px; height: 42px; border-radius: 12px; background: var(--panel-2); border: 1px solid var(--line); display: grid; place-items: center; margin: 0 auto 12px; color: var(--dim); }
  .empty .e-ico svg { width: 19px; height: 19px; }
  .empty b { display: block; color: var(--sub); font-size: 14px; margin-bottom: 3px; }
  .empty p { font-size: 12.5px; }

  /* ================= TAB BAR ================= */
  .tabbar {
    position: absolute; left: 0; right: 0; bottom: 0; z-index: 40;
    display: flex; align-items: flex-end; justify-content: space-around;
    padding: 10px 14px calc(var(--safe-bottom) + 12px);
    background: linear-gradient(transparent, var(--bg) 42%);
  }
  .tabbar .bar-bg {
    position: absolute; left: 14px; right: 14px; bottom: calc(var(--safe-bottom) + 10px); top: 6px;
    background: #0c0f16f0; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--line); border-radius: 17px; z-index: -1;
  }
  .tab { background: none; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 9px 10px; color: var(--dim); transition: color .15s; font-family: inherit; }
  .tab svg { width: 20px; height: 20px; }
  .tab span { font-size: 9.5px; font-weight: 700; letter-spacing: .3px; }
  .tab.on { color: var(--acc); }
  .fab {
    width: 48px; height: 48px; border-radius: 15px; border: none; cursor: pointer;
    background: linear-gradient(135deg, var(--acc), var(--acc-2)); color: #04110c;
    display: grid; place-items: center; margin-bottom: 4px;
    box-shadow: 0 8px 22px -8px #2ce0a780, 0 0 0 4px var(--bg);
    transition: transform .14s;
  }
  .fab:active { transform: scale(.9); }
  .fab svg { width: 22px; height: 22px; }

  /* ================= SHEET ================= */
  .sheet-wrap { position: fixed; inset: 0; z-index: 100; display: none; }
  .sheet-wrap.show { display: block; }
  .sheet-bg { position: absolute; inset: 0; background: #000b; opacity: 0; transition: opacity .28s; backdrop-filter: blur(3px); }
  .sheet-wrap.show .sheet-bg { opacity: 1; }
  .sheet {
    position: absolute; left: 0; right: 0; bottom: 0; max-width: 480px; margin: 0 auto;
    background: linear-gradient(180deg, var(--panel-2), var(--panel));
    border: 1px solid var(--line); border-bottom: none;
    border-radius: 22px 22px 0 0;
    padding: 8px 20px calc(var(--safe-bottom) + 22px);
    max-height: 90dvh; overflow-y: auto;
    transform: translateY(100%); transition: transform .32s cubic-bezier(.2,.8,.2,1);
    box-shadow: 0 -24px 70px -12px #000d;
  }
  .sheet-wrap.show .sheet { transform: none; }
  .grabber { width: 36px; height: 4px; border-radius: 99px; background: #ffffff1c; margin: 8px auto 16px; }
  .sh-crumb { font-size: 10.5px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--dim); margin-bottom: 7px; }
  .sh-title { font-size: 19px; font-weight: 800; letter-spacing: -0.4px; margin-bottom: 4px; line-height: 1.25; }
  .sh-sub { color: var(--sub); font-size: 12.5px; margin-bottom: 18px; }

  .detail-head { display: flex; gap: 13px; align-items: center; margin-bottom: 14px; }
  .detail-head .dh-tile { width: 52px; height: 52px; border-radius: 14px; display: grid; place-items: center; font-size: 24px; background: var(--elev); border: 1px solid var(--line); flex: 0 0 auto; }
  .detail-head .dh-name { font-size: 18px; font-weight: 800; letter-spacing: -0.3px; line-height: 1.25; }
  .detail-head .dh-chips { display: flex; gap: 6px; margin-top: 6px; }
  .detail-tagline { color: var(--sub); font-size: 13px; margin: -2px 0 16px; line-height: 1.55; }

  .case-box {
    border-left: 2px solid var(--acc); background: var(--panel);
    border-radius: 0 var(--r-md) var(--r-md) 0;
    padding: 11px 14px; font-size: 12.5px; color: var(--sub); line-height: 1.6; margin-bottom: 16px;
    border-top: 1px solid var(--line); border-right: 1px solid var(--line); border-bottom: 1px solid var(--line);
  }
  .stack-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; }

  .kv { display: flex; justify-content: space-between; gap: 14px; padding: 10px 0; border-bottom: 1px solid var(--line); font-size: 13px; }
  .kv:last-child { border-bottom: none; }
  .kv .k { color: var(--dim); font-weight: 600; flex: 0 0 auto; }
  .kv .v { font-weight: 650; text-align: right; color: var(--sub); }

  .link-row { display: flex; align-items: center; gap: 11px; padding: 11px 2px; border-bottom: 1px solid var(--line); cursor: pointer; }
  .link-row:last-child { border-bottom: none; }
  .link-row .lr-body { flex: 1; min-width: 0; }
  .link-row .lr-t { font-size: 13.5px; font-weight: 650; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .link-row .lr-s { font-size: 11px; color: var(--dim); font-weight: 600; margin-top: 1px; }
  .link-row .lr-arrow { color: var(--dim); flex: 0 0 auto; }
  .link-row .lr-arrow svg { width: 15px; height: 15px; }

  /* ================= ROADMAP TIMELINE ================= */
  .tl { margin-top: 4px; }
  .tl-item { position: relative; padding: 0 0 18px 42px; }
  .tl-item::before { content: ""; position: absolute; left: 13px; top: 30px; bottom: 0; width: 2px; background: var(--line); }
  .tl-item:last-child { padding-bottom: 4px; }
  .tl-item:last-child::before { display: none; }
  .tl-item.done::before { background: #2ce0a73d; }
  .tl-node {
    position: absolute; left: 0; top: 1px; width: 28px; height: 28px; border-radius: 9px;
    border: 1.5px solid var(--line-2); background: var(--elev);
    display: grid; place-items: center; font-size: 11.5px; font-weight: 800; color: var(--sub);
    cursor: pointer; transition: all .15s;
  }
  .tl-item.done .tl-node { background: linear-gradient(135deg, var(--acc), var(--acc-2)); border-color: transparent; color: #04110c; }
  .tl-node svg { width: 13px; height: 13px; }
  .tl-title { font-size: 13.5px; font-weight: 650; line-height: 1.4; }
  .tl-item.done .tl-title { color: var(--dim); text-decoration: line-through; }
  .tl-meta { display: flex; align-items: center; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
  .tl-guide { display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; font-weight: 750; color: var(--acc); cursor: pointer; }
  .tl-guide svg { width: 13px; height: 13px; }

  /* ================= TUTORIAL ================= */
  .tut-step { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--line); }
  .tut-step:last-of-type { border-bottom: none; }
  .tut-num { flex: 0 0 auto; width: 22px; height: 22px; border-radius: 7px; background: var(--acc-dim); color: var(--acc); font-size: 11px; font-weight: 800; display: grid; place-items: center; margin-top: 1px; }
  .tut-text { font-size: 13.5px; line-height: 1.55; color: var(--sub); padding-top: 1px; }

  .terminal { border: 1px solid var(--line-2); border-radius: var(--r-md); overflow: hidden; margin-top: 14px; background: #05070c; }
  .term-head { display: flex; align-items: center; gap: 8px; padding: 9px 12px; background: var(--panel-2); border-bottom: 1px solid var(--line); }
  .term-dots { display: flex; gap: 5px; }
  .term-dots i { width: 8px; height: 8px; border-radius: 50%; background: var(--line-2); }
  .term-lbl { flex: 1; font-size: 9.5px; font-weight: 800; letter-spacing: 1.2px; color: var(--dim); text-transform: uppercase; }
  .term-copy { display: flex; align-items: center; gap: 5px; border: 1px solid var(--line-2); background: var(--elev); color: var(--sub); font-family: inherit; font-size: 10.5px; font-weight: 700; padding: 5px 9px; border-radius: 7px; cursor: pointer; }
  .term-copy svg { width: 11px; height: 11px; }
  .term-body { padding: 13px 14px; font-family: "JetBrains Mono", ui-monospace, Consolas, monospace; font-size: 11.5px; line-height: 1.7; color: #8ee8c5; white-space: pre-wrap; word-break: break-word; }

  /* ================= FORMS ================= */
  label.f { display: block; margin-bottom: 14px; }
  label.f > span { display: block; font-size: 11px; color: var(--dim); font-weight: 750; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .8px; }
  input, select, textarea {
    width: 100%; background: var(--field); border: 1px solid var(--line); color: var(--txt);
    border-radius: var(--r-md); padding: 12px 13px; font-size: 14.5px; font-family: inherit;
    transition: border-color .15s, box-shadow .15s;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: #2ce0a766; box-shadow: 0 0 0 3px var(--acc-dim); }
  textarea { resize: vertical; min-height: 68px; }
  select { appearance: none; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .picker { display: flex; flex-wrap: wrap; gap: 7px; }
  .pk { padding: 8px 12px; border-radius: 9px; border: 1px solid var(--line); background: var(--field); font-size: 13px; font-weight: 600; color: var(--sub); cursor: pointer; transition: all .13s; }
  .pk.on { border-color: #2ce0a75c; background: var(--acc-dim); color: var(--acc); }
  .emoji-pick { display: flex; flex-wrap: wrap; gap: 6px; }
  .emoji-pick .ep { width: 38px; height: 38px; border-radius: 10px; border: 1px solid var(--line); background: var(--field); font-size: 17px; display: grid; place-items: center; cursor: pointer; }
  .emoji-pick .ep.on { border-color: #2ce0a766; background: var(--acc-dim); }

  .sh-actions { display: flex; gap: 9px; margin-top: 14px; }
  .btn {
    flex: 1; border: none; border-radius: var(--r-md); padding: 14px; font-size: 14px; font-weight: 750;
    font-family: inherit; cursor: pointer; transition: transform .1s, opacity .15s;
    display: inline-flex; align-items: center; justify-content: center; gap: 7px;
  }
  .btn:active { transform: translateY(1px); }
  .btn svg { width: 15px; height: 15px; }
  .btn-p { background: linear-gradient(135deg, var(--acc), var(--acc-2)); color: #04110c; box-shadow: 0 6px 18px -8px #2ce0a780; }
  .btn-g { background: var(--elev); color: var(--txt); border: 1px solid var(--line); flex: 0 0 auto; padding: 14px 18px; }
  .btn-d { background: #f2576712; color: var(--red); border: 1px solid #f2576738; flex: 0 0 auto; padding: 14px 16px; }

  .qa-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 4px 0 6px; }
  .qa { border: 1px solid var(--line); background: var(--field); border-radius: var(--r-lg); padding: 16px 10px; cursor: pointer; transition: all .13s; text-align: center; }
  .qa:active { transform: scale(.95); border-color: var(--line-2); }
  .qa .q-ico { width: 34px; height: 34px; border-radius: 10px; background: var(--acc-dim); color: var(--acc); display: grid; place-items: center; margin: 0 auto 9px; }
  .qa .q-ico svg { width: 16px; height: 16px; }
  .qa .qt { font-weight: 750; font-size: 12.5px; }
  .qa .qd { color: var(--dim); font-size: 10px; margin-top: 2px; font-weight: 600; }

  /* ================= TOAST ================= */
  #toast {
    position: fixed; left: 50%; bottom: calc(var(--safe-bottom) + 96px);
    transform: translateX(-50%) translateY(16px); z-index: 200;
    background: #10141d; border: 1px solid var(--line-2); color: var(--txt);
    padding: 11px 18px; border-radius: var(--r-md); font-size: 13px; font-weight: 650;
    opacity: 0; transition: all .28s; pointer-events: none;
    box-shadow: 0 14px 34px -10px #000; max-width: 86%;
    display: flex; align-items: center; gap: 8px;
  }
  #toast svg { width: 14px; height: 14px; color: var(--acc); flex: 0 0 auto; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ================= SPLASH ================= */
  #splash { position: fixed; inset: 0; z-index: 500; background: var(--bg); display: grid; place-items: center; transition: opacity .45s; }
  #splash.hide { opacity: 0; pointer-events: none; }
  #splash .s-mark { width: 72px; height: 72px; border-radius: 20px; background: linear-gradient(135deg, var(--acc), var(--acc-2)); display: grid; place-items: center; box-shadow: 0 18px 48px -12px #2ce0a766; animation: pop .55s cubic-bezier(.2,1.3,.4,1); margin: 0 auto; }
  #splash .s-mark svg { width: 32px; height: 32px; }
  #splash .s-word { text-align: center; margin-top: 20px; animation: viewIn .5s .12s both; }
  #splash .s-word b { font-size: 16px; font-weight: 800; letter-spacing: 3px; }
  #splash .s-word small { display: block; color: var(--dim); font-weight: 700; font-size: 9.5px; letter-spacing: 2.5px; text-transform: uppercase; margin-top: 5px; }
  @keyframes pop { from { transform: scale(.4); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .conf { position: fixed; z-index: 300; width: 7px; height: 7px; border-radius: 2px; pointer-events: none; }

  /* ================= GATE ================= */
  #gate {
    position: fixed; inset: 0; z-index: 400;
    background: radial-gradient(560px 300px at 50% -12%, #131a2b, transparent 65%), var(--bg);
    display: flex; flex-direction: column; align-items: center;
    padding: calc(var(--safe-top) + 44px) 24px calc(var(--safe-bottom) + 30px);
    max-width: 480px; margin: 0 auto; overflow-y: auto;
  }
  #gate.hide { display: none; }
  .gate-mark { width: 56px; height: 56px; border-radius: 16px; background: linear-gradient(135deg, var(--acc), var(--acc-2)); display: grid; place-items: center; box-shadow: 0 14px 36px -10px #2ce0a766; margin-bottom: 18px; }
  .gate-mark svg { width: 25px; height: 25px; }
  .gate-word { font-size: 15px; font-weight: 800; letter-spacing: 3px; }
  .gate-sys { color: var(--dim); font-weight: 700; font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; margin-top: 4px; }
  .gate-sub { color: var(--sub); font-size: 13px; margin: 26px 0 18px; font-weight: 600; }
  .avatar-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; width: 100%; }
  .avatar-card {
    background: linear-gradient(180deg, var(--panel-2), var(--panel));
    border: 1px solid var(--line); border-radius: var(--r-lg);
    padding: 18px 10px 15px; display: flex; flex-direction: column; align-items: center; gap: 9px;
    cursor: pointer; transition: all .14s;
  }
  .avatar-card:active { transform: scale(.96); border-color: var(--line-2); }
  .avatar-card .aname { font-weight: 750; font-size: 13.5px; }
  .avatar-card .arole { color: var(--dim); font-size: 10px; text-align: center; line-height: 1.35; font-weight: 600; }

  .pin-wrap { width: 100%; max-width: 292px; margin: 0 auto; text-align: center; }
  .pin-who { display: flex; flex-direction: column; align-items: center; gap: 11px; margin-bottom: 28px; }
  .pin-who .who-name { font-weight: 750; font-size: 15px; }
  .pin-dots { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
  .pin-dots.err-row { animation: shake .4s; }
  @keyframes shake { 10%,90%{transform:translateX(-1px)} 20%,80%{transform:translateX(2px)} 30%,50%,70%{transform:translateX(-4px)} 40%,60%{transform:translateX(4px)} }
  .pin-dot { width: 13px; height: 13px; border-radius: 50%; border: 1.5px solid var(--line-2); transition: all .14s; }
  .pin-dot.filled { background: var(--acc); border-color: var(--acc); box-shadow: 0 0 9px #2ce0a766; }
  .pin-dot.err { background: var(--red); border-color: var(--red); box-shadow: none; }
  .pin-pad { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; width: 100%; }
  .pin-key {
    aspect-ratio: 1.15; border-radius: 14px; background: var(--panel-2); border: 1px solid var(--line);
    color: var(--txt); font-family: inherit; font-size: 19px; font-weight: 700; cursor: pointer;
    display: grid; place-items: center; transition: all .1s; font-variant-numeric: tabular-nums;
  }
  .pin-key:active { background: var(--elev); transform: scale(.94); }
  .pin-key.ghost { background: none; border: none; }
  .back-link { margin-top: 24px; color: var(--dim); font-size: 12.5px; font-weight: 700; cursor: pointer; }

  /* ================= MISC ================= */
  .install-banner { display: none; align-items: center; gap: 12px; background: var(--panel-2); border: 1px solid var(--line-2); border-radius: var(--r-lg); padding: 12px 14px; margin: 14px 0 0; }
  .install-banner.show { display: flex; }
  .install-banner .ib-ico { width: 34px; height: 34px; border-radius: 10px; background: var(--acc-dim); color: var(--acc); display: grid; place-items: center; flex: 0 0 auto; }
  .install-banner .ib-ico svg { width: 16px; height: 16px; }
  .install-banner .ib-t { flex: 1; font-size: 12.5px; font-weight: 650; line-height: 1.4; }
  .install-banner .ib-t small { display: block; color: var(--dim); font-weight: 600; font-size: 10.5px; }
  .install-banner button { border: none; background: var(--acc); color: #04110c; font-family: inherit; font-weight: 750; padding: 8px 13px; border-radius: 9px; font-size: 12px; cursor: pointer; }

  .sysrow { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--line); font-size: 12.5px; }
  .sysrow:last-child { border-bottom: none; }
  .sysrow .k { color: var(--dim); font-weight: 600; }
  .sysrow .v { font-weight: 650; color: var(--sub); display: flex; align-items: center; gap: 6px; }
  .sysrow .v .sdot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }

  /* ===== v4: Focus card ===== */
  .focus {
    position: relative; margin-top: 16px; padding: 17px 17px 16px;
    border-radius: var(--r-lg); cursor: pointer; overflow: hidden;
    background: linear-gradient(150deg, #12271f, #10141d 62%);
    border: 1px solid #2ce0a733;
    transition: transform .12s, border-color .15s;
  }
  .focus:active { transform: scale(.99); }
  .focus::before { content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background: linear-gradient(var(--acc), var(--acc-2)); }
  .focus.claim { background: linear-gradient(150deg, #1a1830, #10141d 62%); border-color: #6d5df03d; }
  .focus.claim::before { background: linear-gradient(var(--acc-2), var(--blue)); }
  .focus-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 9px; }
  .focus-kick { display: inline-flex; align-items: center; gap: 6px; font-size: 10.5px; font-weight: 800; letter-spacing: .8px; text-transform: uppercase; color: var(--acc); }
  .focus-kick svg { width: 13px; height: 13px; }
  .focus.claim .focus-kick { color: #a89bff; }
  .focus-go { color: var(--dim); } .focus-go svg { width: 17px; height: 17px; }
  .focus-title { font-size: 17px; font-weight: 750; letter-spacing: -0.3px; line-height: 1.3; }
  .focus-sub { color: var(--sub); font-size: 12.5px; line-height: 1.5; margin-top: 6px; }
  .focus-meta { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .focus-cta { display: inline-flex; align-items: center; gap: 7px; margin-top: 13px; font-size: 13px; font-weight: 750; color: var(--acc); background: var(--acc-dim); border: 1px solid #2ce0a733; padding: 9px 13px; border-radius: 10px; }
  .focus-cta svg { width: 15px; height: 15px; }
  .focus.claim .focus-cta { color: #b9aeff; background: #6d5df016; border-color: #6d5df033; }

  /* ===== v4: Quick row ===== */
  .quick-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 9px; margin-top: 12px; }
  .quick {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 13px 8px; border-radius: var(--r-md); cursor: pointer;
    background: var(--panel); border: 1px solid var(--line); color: var(--sub);
    font-family: inherit; font-size: 11.5px; font-weight: 700; transition: all .13s;
  }
  .quick:active { transform: scale(.95); border-color: var(--line-2); }
  .quick svg { width: 19px; height: 19px; color: var(--acc); }

  .chip.mine { color: var(--acc); background: var(--acc-dim); border-color: #2ce0a74d; }
  .tag.ghost { color: var(--dim); background: transparent; }
  .tag.ghost svg { width: 11px; height: 11px; vertical-align: -1px; }
  .tag.tap { text-decoration: none; color: #a89bff; background: #6d5df012; border-color: #6d5df02e; }
  .tag.tap svg { width: 10px; height: 10px; vertical-align: -1px; margin-left: 1px; }

  .tool-ico { width: 38px; height: 38px; flex: 0 0 auto; border-radius: 10px; background: var(--elev); border: 1px solid var(--line); display: grid; place-items: center; font-size: 16px; font-weight: 800; color: var(--sub); }
  .tool-ico svg { width: 17px; height: 17px; }
  a.link-row { text-decoration: none; color: inherit; }

  /* ===== v4: Tutorial richer ===== */
  .tut-badges { display: flex; gap: 7px; margin-bottom: 14px; flex-wrap: wrap; }
  .tut-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; font-weight: 700; color: var(--sub); background: var(--elev); border: 1px solid var(--line); padding: 6px 10px; border-radius: 8px; }
  .tut-badge svg { width: 13px; height: 13px; color: var(--dim); }
  .goal-box { display: flex; flex-direction: column; gap: 5px; background: linear-gradient(150deg, #12271f, var(--panel) 70%); border: 1px solid #2ce0a72e; border-radius: var(--r-md); padding: 12px 14px; margin-bottom: 4px; }
  .goal-box .gb-lbl { display: inline-flex; align-items: center; gap: 6px; font-size: 10.5px; font-weight: 800; letter-spacing: .7px; text-transform: uppercase; color: var(--acc); }
  .goal-box .gb-lbl svg { width: 13px; height: 13px; }
  .goal-box .gb-txt { font-size: 14px; font-weight: 650; line-height: 1.45; }
  .tip-box { display: flex; gap: 10px; align-items: flex-start; background: #f0a8320d; border: 1px solid #f0a83226; border-radius: var(--r-md); padding: 12px 14px; margin: 14px 0 4px; font-size: 13px; color: var(--sub); line-height: 1.5; }
  .tip-box svg { width: 17px; height: 17px; color: var(--amber); flex: 0 0 auto; margin-top: 1px; }
  .tip-box b { color: var(--amber); }
  .term-lbl-row { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 800; letter-spacing: .6px; text-transform: uppercase; color: var(--dim); margin: 18px 0 8px; }
  .term-lbl-row svg { width: 13px; height: 13px; color: var(--acc); }
  .btn-tool { background: var(--elev); color: var(--txt); border: 1px solid var(--line-2); text-decoration: none; }
  .btn-tool svg { width: 15px; height: 15px; color: var(--acc); }
  .btn-ghost2 { background: transparent; color: var(--sub); border: 1px dashed var(--line-2); font-size: 13px; }
  .btn-ghost2 svg { width: 14px; height: 14px; }

  /* ===== v4: Onboarding ===== */
  #onboard { position: fixed; inset: 0; z-index: 450; display: none; align-items: flex-end; background: #000c; backdrop-filter: blur(4px); }
  #onboard.show { display: flex; animation: obfade .3s; }
  @keyframes obfade { from { opacity: 0; } to { opacity: 1; } }
  .ob-card { width: 100%; max-width: 480px; margin: 0 auto; background: linear-gradient(180deg, var(--panel-2), var(--panel)); border: 1px solid var(--line); border-bottom: none; border-radius: 24px 24px 0 0; padding: 30px 24px calc(var(--safe-bottom) + 26px); text-align: center; animation: obup .38s cubic-bezier(.2,.8,.2,1); }
  @keyframes obup { from { transform: translateY(100%); } to { transform: none; } }
  .ob-ico { width: 64px; height: 64px; border-radius: 18px; margin: 0 auto 20px; background: linear-gradient(135deg, var(--acc), var(--acc-2)); display: grid; place-items: center; box-shadow: 0 14px 34px -10px #2ce0a766; }
  .ob-ico svg { width: 30px; height: 30px; color: #04110c; }
  .ob-t { font-size: 21px; font-weight: 800; letter-spacing: -0.4px; }
  .ob-s { color: var(--sub); font-size: 14px; line-height: 1.55; margin: 10px auto 22px; max-width: 340px; }
  .ob-dots { display: flex; justify-content: center; gap: 7px; margin-bottom: 22px; }
  .ob-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--line-2); transition: all .2s; }
  .ob-dot.on { width: 22px; border-radius: 99px; background: var(--acc); }
  .ob-skip { margin-top: 14px; color: var(--dim); font-size: 12.5px; font-weight: 650; cursor: pointer; }

  /* ===== v4: mobile touch tuning ===== */
  .btn { min-height: 48px; }
  .mbtn { min-height: 40px; }
  .tl-title { cursor: pointer; }
  .tl-guide { min-height: 26px; }
  @media (max-width: 374px) {
    .kpis { gap: 8px; } .kpi { padding: 12px 12px 10px; } .kpi .k-num { font-size: 24px; }
    .quick { padding: 11px 5px; font-size: 11px; }
    .page-title { font-size: 21px; }
    .hero .big { font-size: 21px; }
    .qa-grid { gap: 8px; } .qa { padding: 14px 8px; }
  }
</style>
</head>
<body>

<div id="splash">
  <div>
    <div class="s-mark"><svg viewBox="0 0 24 24" fill="#04110c"><path d="M13.2 2 4.5 13.4h5.6L9.6 22l8.9-11.6h-5.6L13.2 2z"/></svg></div>
    <div class="s-word"><b>SIDEQUEST</b><small>Mission Control</small></div>
  </div>
</div>

<div id="gate">
  <div class="gate-mark"><svg viewBox="0 0 24 24" fill="#04110c"><path d="M13.2 2 4.5 13.4h5.6L9.6 22l8.9-11.6h-5.6L13.2 2z"/></svg></div>
  <div class="gate-word">SIDEQUEST</div>
  <div class="gate-sys">Mission Control · Team-Zugang</div>
  <div class="gate-sub" id="gateSub">Wähle dein Profil</div>
  <div id="gateBody" style="width:100%"></div>
</div>

<div id="app">
  <div class="topbar">
    <div class="brand">
      <div class="mark"><svg viewBox="0 0 24 24" fill="#04110c"><path d="M13.2 2 4.5 13.4h5.6L9.6 22l8.9-11.6h-5.6L13.2 2z"/></svg></div>
      <div style="min-width:0">
        <div class="b-name" id="brandName">Sidequest HQ</div>
        <div class="b-sys">Mission Control</div>
      </div>
    </div>
    <div class="top-right">
      <div class="sync-pill" id="syncPill" onclick="openSettings()"><span class="sdot"></span><span id="syncLbl">Sync…</span></div>
      <div class="me-chip" id="meBtn" onclick="openSettings()"></div>
    </div>
  </div>

  <main id="view"></main>

  <nav class="tabbar">
    <div class="bar-bg"></div>
    <button class="tab" data-tab="home" onclick="nav('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg><span>Übersicht</span>
    </button>
    <button class="tab" data-tab="projects" onclick="nav('projects')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.6"/><rect x="14" y="3" width="7" height="7" rx="1.6"/><rect x="3" y="14" width="7" height="7" rx="1.6"/><rect x="14" y="14" width="7" height="7" rx="1.6"/></svg><span>Ventures</span>
    </button>
    <button class="fab" onclick="openQuickAdd()" aria-label="Neu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
    </button>
    <button class="tab" data-tab="tasks" onclick="nav('tasks')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3 8-8"/><path d="M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h9"/></svg><span>Aufgaben</span>
    </button>
    <button class="tab" data-tab="team" onclick="nav('team')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.2"/><path d="M3.5 20a5.5 5.5 0 0 1 11 0"/><path d="M16 5.2a3.2 3.2 0 0 1 0 5.6"/><path d="M17 20a5.5 5.5 0 0 0-3-4.9"/></svg><span>Team</span>
    </button>
  </nav>

function greeting(){ const h=new Date().getHours(); return h<11?"Guten Morgen":h<17?"Guten Tag":h<22?"Guten Abend":"Späte Schicht"; }
function timeAgo(iso){
  if(!iso) return "";
  const s = Math.max(0, (Date.now() - new Date(iso).getTime())/1000);
  if(s<60) return "gerade eben";
  if(s<3600) return "vor "+Math.floor(s/60)+" Min";
  if(s<86400) return "vor "+Math.floor(s/3600)+" Std";
  const d = Math.floor(s/86400);
  return d===1 ? "gestern" : "vor "+d+" Tagen";
}

async function initCloud(){
  if(!sb){ updateSyncPill(); return; }
  try {
    const [{data:projRows}, {data:taskRows}, {data:ideaRows}, {data:subRows}, {data:setRows}, {data:actRows}] = await Promise.all([
      sb.from("projects").select("*"), sb.from("tasks").select("*"), sb.from("ideas").select("*"),
      sb.from("subtasks_done").select("*"), sb.from("settings").select("*"),
      sb.from("activity").select("*").order("created_at",{ascending:false}).limit(25),
    ]);

    if(!projRows || projRows.length===0){
      await sb.from("projects").upsert(state.projects.map(projectRow));
      await sb.from("tasks").upsert(state.tasks.map(taskRow));
    } else {
      const byId = Object.fromEntries(projRows.map(r=>[r.id,r]));
      state.projects.forEach(p=>{ const r=byId[p.id]; if(r){ p.status=r.status; p.progress=r.progress; p.members=r.members||[]; if(r.name) p.name=r.name; if(r.type) p.type=r.type; } });
      const knownIds = new Set(state.projects.map(p=>p.id));
      projRows.filter(r=>!knownIds.has(r.id)).forEach(r=>{
        state.projects.push({ id:r.id, emoji:r.emoji, name:r.name, type:r.type, tagline:r.tagline, why:r.why, stack:r.stack||[], status:r.status, progress:r.progress, guided:r.guided, members:r.members||[] });
      });
    }
    if(taskRows && taskRows.length){ state.tasks = taskRows.map(r=>({ id:r.id, title:r.title, projectId:r.project_id||"", assignee:r.assignee||"", status:r.status, prio:r.prio })); }
    if(ideaRows){ state.ideas = ideaRows.map(r=>({ id:r.id, text:r.text })); }
    if(subRows){
      state.subtasksDone = {};
      subRows.forEach(r=>{ state.subtasksDone[subKey(r.project_id,r.subtask_title)] = r.done; });
      state.projects.filter(p=>p.guided&&p.subtasks).forEach(p=>{ const done=p.subtasks.filter(s=>isSubDone(p.id,s.title)).length; p.progress=Math.round(done/p.subtasks.length*100); });
    }
    if(setRows){ const org = setRows.find(r=>r.key==="org"); if(org) state.org = org.value; }
    if(actRows){ state.activity = actRows.map(r=>({ id:r.id, actor:r.actor, action:r.action, target:r.target, created_at:r.created_at })); }

    persist();
    cloudReady = true;
    updateSyncPill();
    subscribeRealtime();
    if(activeProfile && getComputedStyle($("#app")).display!=="none"){
      try { render(); renderMeBtn(); $("#brandName").textContent = state.org; } catch(e) { console.warn("Render nach Sync fehlgeschlagen:", e); }
    }
  } catch(e) { console.warn("Cloud-Sync nicht verfügbar, arbeite lokal weiter.", e); updateSyncPill(); }
}

function subscribeRealtime(){
  if(!sb) return;
  sb.channel("sq-sync")
    .on("postgres_changes", { event:"*", schema:"public", table:"projects" }, handleRealtimeProject)
    .on("postgres_changes", { event:"*", schema:"public", table:"tasks" }, handleRealtimeTask)
    .on("postgres_changes", { event:"*", schema:"public", table:"ideas" }, handleRealtimeIdea)
    .on("postgres_changes", { event:"*", schema:"public", table:"subtasks_done" }, handleRealtimeSub)
    .on("postgres_changes", { event:"INSERT", schema:"public", table:"activity" }, handleRealtimeActivity)
    .subscribe();
}
function handleRealtimeProject(payload){
  if(payload.eventType==="DELETE"){ state.projects = state.projects.filter(p=>p.id!==payload.old.id); }
  else {
    const r=payload.new; let p=project(r.id);
    if(p){ p.status=r.status; p.progress=r.progress; p.members=r.members||[]; if(r.name) p.name=r.name; if(r.type) p.type=r.type; }
    else { state.projects.push({ id:r.id, emoji:r.emoji, name:r.name, type:r.type, tagline:r.tagline, why:r.why, stack:r.stack||[], status:r.status, progress:r.progress, guided:r.guided, members:r.members||[] }); }
  }
  persist();
  if(tab==="projects"||tab==="home") render();
}
function handleRealtimeTask(payload){
  if(payload.eventType==="DELETE"){ state.tasks = state.tasks.filter(t=>t.id!==payload.old.id); }
  else {
    const r=payload.new; let t=state.tasks.find(x=>x.id===r.id);
    const mapped={ id:r.id, title:r.title, projectId:r.project_id||"", assignee:r.assignee||"", status:r.status, prio:r.prio };
    if(t){ Object.assign(t,mapped); } else { state.tasks.unshift(mapped); }
  }
  persist();
  if(tab==="tasks"||tab==="home") render();
}
function handleRealtimeIdea(payload){
  if(payload.eventType==="DELETE"){ state.ideas = state.ideas.filter(i=>i.id!==payload.old.id); }
  else { const r=payload.new; if(!state.ideas.find(i=>i.id===r.id)) state.ideas.unshift({id:r.id,text:r.text}); }
  persist();
}
function handleRealtimeSub(payload){
  const r = payload.eventType==="DELETE" ? payload.old : payload.new;
  state.subtasksDone = state.subtasksDone||{};
  state.subtasksDone[subKey(r.project_id, r.subtask_title)] = payload.eventType==="DELETE" ? false : r.done;
  const p = project(r.project_id);
  if(p && p.guided && p.subtasks){ const done=p.subtasks.filter(s=>isSubDone(p.id,s.title)).length; p.progress=Math.round(done/p.subtasks.length*100); }
  persist();
  if(tab==="projects"||tab==="home") render();
}
function handleRealtimeActivity(payload){
  const r = payload.new;
  if(state.activity.find(a=>a.id===r.id)) return;
  state.activity.unshift({ id:r.id, actor:r.actor, action:r.action, target:r.target, created_at:r.created_at });
  state.activity = state.activity.slice(0, 30);
  persist();
  if(tab==="home") render();
}

function ringSVG(pct){

  return `<div class="ring-wrap">
    <svg width="64" height="64" viewBox="0 0 64 64">
      <defs><linearGradient id="rg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2ce0a7"/><stop offset="1" stop-color="#6d5df0"/></linearGradient></defs>
      <circle cx="32" cy="32" r="${r}" stroke="#ffffff0d" stroke-width="5.5" fill="none"/>
      <circle cx="32" cy="32" r="${r}" stroke="url(#rg)" stroke-width="5.5" fill="none" stroke-linecap="round"
        stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 32 32)"/>
    </svg>
    <div class="ring-val num">${pct}%</div>
  </div>`;
}

function myVentures(id){ return state.projects.filter(p=>p.guided && (p.members||[]).includes(id)); }
function nextStepOf(p){ if(!p.subtasks) return null; const i=p.subtasks.findIndex(s=>!isSubDone(p.id,s.title)); return i<0?null:{i, s:p.subtasks[i]}; }
function focusFor(id){
  const mine = myVentures(id).slice().sort((a,b)=>b.progress-a.progress);
  for(const p of mine){ const ns=nextStepOf(p); if(ns) return {type:"step", p, i:ns.i, s:ns.s}; }
  const doingT = state.tasks.find(t=>t.assignee===id && t.status==="doing");
  if(doingT) return {type:"task", t:doingT};
  const todoT = state.tasks.find(t=>t.assignee===id && t.status==="todo");
  if(todoT) return {type:"task", t:todoT};
  if(mine.length) return {type:"done"};
  return {type:"claim"};
}

function saveProject(id){

function delProject(id){ if(!confirm("Projekt wirklich löschen? Das gilt für das ganze Team."))return;

  state.projects=state.projects.filter(p=>p.id!==id); state.tasks=state.tasks.filter(t=>t.projectId!==id);
  persist(); cloudDeleteProject(id); relatedTaskIds.forEach(cloudDeleteTask);
  closeSheet(); render(); toast("Gelöscht"); }

function toggleClaim(id){
  const p=project(id); if(!p) return;
  p.members = p.members || [];
  const has = p.members.includes(activeProfile);
  if(has){ p.members = p.members.filter(x=>x!==activeProfile); }
  else { p.members.push(activeProfile); if(p.status==="idea"){ p.status="doing"; } }
  persist(); cloudUpsertProject(p);
  if(!has){ toast("Venture übernommen — leg los!"); logActivity(`hat das Venture „${p.name}“ übernommen`); }
  else { toast("Venture verlassen"); }
  openProject(id);
}
function openProject(id){
  const p=project(id); if(!p)return; const st=STATUS[p.status];
  const members = p.members||[];
  const mineHere = members.includes(activeProfile);
  const recommended = p.guided ? (p.fit||[]).filter(x=>!members.includes(x)) : [];
  const doneN = p.guided&&p.subtasks ? p.subtasks.filter(s=>isSubDone(p.id,s.title)).length : 0;
  let body = `
    <div class="detail-head"><div class="dh-tile">${p.emoji}</div>
      <div><div class="dh-name">${esc(p.name)}</div>
      <div class="dh-chips">${p.guided?'<span class="chip venture">Venture</span>':''}<span class="chip ${st.c}">${st.l}</span></div></div></div>
    ${p.tagline?`<div class="detail-tagline">${esc(p.tagline)}</div>`:""}
    <div class="pbar" style="display:flex;align-items:center;gap:10px;margin-bottom:16px"><div class="bar" style="flex:1"><div class="fill" data-w="${p.progress}" style="width:${p.progress}%"></div></div><span class="pct num">${p.progress}%</span></div>
  `;
  if(p.guided){
    body += `<button class="btn ${mineHere?'btn-g':'btn-p'}" style="width:100%;margin-bottom:16px" onclick="toggleClaim('${id}')">${mineHere?IC.check+' Du bist im Team — antippen zum Verlassen':IC.hand+' Dieses Venture übernehmen'}</button>`;
  }
  if(p.why){ body += `<div class="kicker" style="margin-top:4px"><h3>Business Case</h3></div><div class="case-box">${esc(p.why)}</div>`; }
  if(p.stack?.length){ body += `<div class="kicker"><h3>Stack · 100% Free Tier</h3></div><div class="stack-row">${p.stack.map(s=>{const u=toolLink(s);return u?`<a class="tag tap" href="${u}" target="_blank" rel="noopener">${esc(s)} ${IC.ext}</a>`:`<span class="tag">${esc(s)}</span>`;}).join("")}</div>`; }
  if(members.length){
    body += `<div class="kicker"><h3>Im Team</h3><span class="k-meta num">${members.length}</span></div>`;
    body += members.map(mid=>{ const m=fullMember(mid); if(!m) return ""; return `<div class="link-row" onclick="openMemberDetail('${mid}')">
      ${mono(mid,32,10)}
      <div class="lr-body"><div class="lr-t">${esc(m.name)}${mid===activeProfile?' · Du':''}</div><div class="lr-s">${esc(m.role)}</div></div>
      <span class="lr-arrow">${IC.arrow}</span></div>`; }).join("");
  }
  if(recommended.length){
    body += `<div class="kicker"><h3>Empfohlen für dieses Venture</h3></div>`;
    body += recommended.map(mid=>{ const m=fullMember(mid); if(!m) return ""; return `<div class="link-row" onclick="openMemberDetail('${mid}')">
      ${mono(mid,32,10)}
      <div class="lr-body"><div class="lr-t">${esc(m.name)}</div><div class="lr-s">${esc(m.role)}</div></div>
      <span class="lr-arrow">${IC.arrow}</span></div>`; }).join("");
  }
  if(p.guided && p.subtasks){
    body += `<div class="kicker"><h3>Fahrplan</h3><span class="k-meta num">${doneN}/${p.subtasks.length} erledigt</span></div><div class="tl">`;
    body += p.subtasks.map((s,i)=>subtaskRow(p.id,s,i)).join("");
    body += `</div>`;
  } else {
    const tks=state.tasks.filter(t=>t.projectId===id);
    body += `<div class="kicker"><h3>Aufgaben</h3><span class="k-meta num">${tks.filter(t=>t.status!=="done").length} offen · ${tks.filter(t=>t.status==="done").length} erledigt</span></div>`;
    if(tks.length) body += tks.map(t=>`<div class="link-row" onclick="openTask('${t.id}')">
      <span class="prio-chip ${t.prio} num" style="margin-top:0">${PRIO_LBL[t.prio]}</span>
      <div class="lr-body"><div class="lr-t" style="${t.status==='done'?'text-decoration:line-through;color:var(--dim)':''}">${esc(t.title)}</div></div>
      <span class="lr-arrow">${IC.arrow}</span></div>`).join("");
    else body += `<div style="color:var(--dim);font-size:12.5px;padding:6px 2px 2px">Noch keine Aufgaben in diesem Projekt.</div>`;
  }
  body += `<div class="sh-actions" style="margin-top:18px"><button class="btn btn-g" onclick="editTask(null,'${id}')">+ Aufgabe</button><button class="btn btn-p" onclick="editProject('${id}')">Bearbeiten</button></div>`;
  openSheet(body);
}

/* ---- Guided venture subtasks + tutorials ---- */
function subKey(pid,title){ return pid+"::"+title; }
function isSubDone(pid,title){ return (state.subtasksDone||{})[subKey(pid,title)]===true; }
function toggleSub(pid,title){
  state.subtasksDone = state.subtasksDone||{};
  const k=subKey(pid,title);
  const now = !state.subtasksDone[k];
  state.subtasksDone[k]=now;
  const p=project(pid);
  const done = p.subtasks.filter(s=>isSubDone(pid,s.title)).length;
  p.progress = Math.round(done/p.subtasks.length*100);
  persist(); cloudSetSub(pid,title,now); cloudUpsertProject(p);
  if(now){ confetti(); toast("Schritt erledigt"); logActivity(`hat „${title}“ in ${p.name} erledigt`); }
  openProject(pid);
}
function subtaskRow(pid,s,i){
  const done = isSubDone(pid,s.title);
  const safe = s.title.replace(/'/g,"\\'");
  const meta = tutMeta(pid,i);
  return `<div class="tl-item ${done?'done':''}">
    <div class="tl-node num" onclick="toggleSub('${pid}','${safe}')">${done?IC.check:(i+1)}</div>
    <div class="tl-title" onclick="openTutorial('${pid}',${i})">${esc(s.title)}</div>
    <div class="tl-meta">
      <span class="tag">${esc(s.tool)}</span>
      ${meta?`<span class="tag ghost">${IC.clock} ${esc(meta.time)}</span>`:''}
      <span class="tl-guide" onclick="openTutorial('${pid}',${i})">${IC.book} Anleitung öffnen</span>
    </div>
  </div>`;
}
function openTutorial(pid,i){
  const p=project(pid); const s=p.subtasks[i];

  openSheet(`

    <h3 class="sh-title">${esc(s.title)}</h3>

      ${meta?`<span class="tut-badge">${IC.clock} ${esc(meta.time)}</span>`:''}
    </div>
    ${meta?`<div class="goal-box"><div class="gb-lbl">${IC.flag} Am Ende hast du</div><div class="gb-txt">${esc(meta.goal)}</div></div>`:''}
    <div class="kicker" style="margin-top:6px"><h3>So gehst du vor</h3></div>
    ${steps}
    ${meta?`<div class="tip-box">${IC.bulb}<div><b>Pro-Tipp:</b> ${esc(meta.tip)}</div></div>`:''}
    <div class="term-lbl-row">${IC.zap} Fertiger Claude-Prompt — kopieren & einfügen</div>
    <div class="terminal">
      <div class="term-head"><div class="term-dots"><i></i><i></i><i></i></div><span class="term-lbl">Claude Prompt</span>
        <button class="term-copy" onclick="copyPrompt(this)">${IC.copy} Kopieren</button></div>
      <div class="term-body" id="promptBody">${esc(s.prompt)}</div>
    </div>
    ${link?`<a class="btn btn-tool" href="${link}" target="_blank" rel="noopener" style="width:100%;margin-top:12px">${IC.ext} ${esc(s.tool.split(/[·\/+]/)[0].trim())} öffnen</a>`:''}

function copyPrompt(btn){

function importData(){ const inp=document.createElement("input"); inp.type="file"; inp.accept=".json"; inp.onchange=e=>{ const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{ try{ const d=JSON.parse(r.result); if(d.projects){ state=d; state.activity=state.activity||[]; persist(); closeSheet(); render(); toast("Backup geladen"); } else toast("Ungültige Datei"); }catch(x){ toast("Fehler beim Laden"); } }; r.readAsText(f); }; inp.click(); }

function openGuide(id){
  const g = GUIDES.find(x=>x.id===id); if(!g) return;
  const steps = g.steps.map((st,idx)=>`<div class="tut-step"><div class="tut-num num">${idx+1}</div><div class="tut-text">${esc(st)}</div></div>`).join("");
  openSheet(`<div class="sh-crumb num">Einsteiger-Guide</div><h3 class="sh-title">${esc(g.title)}</h3><div class="sh-sub">${esc(g.sub)}</div>${steps}
    <div class="sh-actions" style="margin-top:16px"><button class="btn btn-g" onclick="openHelp()">Alle Guides</button><button class="btn btn-p" onclick="closeSheet()">Verstanden</button></div>`);
}

/* ---- Onboarding (einmal pro Profil) ---- */
const OB_SLIDES = [
  { icon:"rocket", t:"Willkommen im Team", s:"Das ist eure Kommandozentrale — hier läuft alles zusammen, was ihr für eure Projekte braucht. In 20 Sekunden bist du startklar." },
  { icon:"layers", t:"Wähle dein Venture", s:"10 startklare Business-Ideen mit komplettem Fahrplan. Such dir eins aus, das zu dir passt, und tippe auf „Übernehmen“." },
  { icon:"book", t:"Folge der Anleitung", s:"Jeder Schritt hat ein klares Ziel, eine Erklärung und einen fertigen Claude-Prompt zum Kopieren. Du bist nie verloren." },
  { icon:"live", t:"Ihr arbeitet zusammen", s:"Hakst du einen Schritt ab, sieht es das ganze Team sofort — live. Gemeinsam kommt ihr schneller ans Ziel." },
];
let obIndex = 0;
function maybeOnboard(){
  if(localStorage.getItem("sq_onboarded_"+activeProfile)==="1") return;
  obIndex = 0; renderOnboard();
  $("#onboard").classList.add("show");
}
function renderOnboard(){
  const s = OB_SLIDES[obIndex];
  const last = obIndex===OB_SLIDES.length-1;
  const dots = OB_SLIDES.map((_,i)=>`<span class="ob-dot ${i===obIndex?'on':''}"></span>`).join("");
  $("#onboard").innerHTML = `<div class="ob-card">
    <div class="ob-ico">${IC[s.icon]||IC.rocket}</div>
    <div class="ob-t">${esc(s.t)}</div>
    <div class="ob-s">${esc(s.s)}</div>
    <div class="ob-dots">${dots}</div>
    <button class="btn btn-p" style="width:100%" onclick="${last?'finishOnboard()':'nextOnboard()'}">${last?"Los geht's":'Weiter'}</button>
    ${last?'':'<div class="ob-skip" onclick="finishOnboard()">Überspringen</div>'}
  </div>`;
}
function nextOnboard(){ obIndex++; renderOnboard(); }
function finishOnboard(){ localStorage.setItem("sq_onboarded_"+activeProfile,"1"); $("#onboard").classList.remove("show"); }

/* ============================================================
   FX
   ============================================================ */
let toastT;
function toast(msg){ const t=$("#toast"); t.innerHTML=IC.check+esc(msg); t.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),1900); }
function confetti(){
  const cols=["#2ce0a7","#6d5df0","#4c8dff","#f0a832"];
  for(let i=0;i<14;i++){ const c=document.createElement("div"); c.className="conf";
    c.style.background=cols[i%cols.length]; c.style.left=(50+(Math.random()*30-15))+"%"; c.style.top="72%";
    document.body.appendChild(c); const x=(Math.random()*2-1)*130, y=-(100+Math.random()*180), r=Math.random()*540;
    c.animate([{transform:"translate(0,0) rotate(0)",opacity:1},{transform:`translate(${x}px,${y}px) rotate(${r}deg)`,opacity:0}],{duration:800+Math.random()*400,easing:"cubic-bezier(.2,.7,.3,1)"}).onfinish=()=>c.remove();
  }
}

let deferredPrompt=null;
window.addEventListener("beforeinstallprompt",e=>{ e.preventDefault(); deferredPrompt=e; const b=$("#installBanner"); if(b)b.classList.add("show"); });
function doInstall(){ if(!deferredPrompt){ toast("Browser-Menü → „Zum Startbildschirm“"); return; } deferredPrompt.prompt(); deferredPrompt.userChoice.finally(()=>{ deferredPrompt=null; const b=$("#installBanner"); if(b)b.classList.remove("show"); }); }

/* ---- boot ---- */
$("#brandName").textContent = state.org;
if(activeProfile && profileOf(activeProfile)){ bootApp(); } else { renderGate(); }
setTimeout(()=>$("#splash").classList.add("hide"),900);
if("serviceWorker" in navigator && location.protocol.startsWith("http")){
  let reloaded=false;
  navigator.serviceWorker.addEventListener("controllerchange",()=>{ if(reloaded)return; reloaded=true; location.reload(); });
  navigator.serviceWorker.register("sw.js").then(reg=>{ reg.update&&reg.update(); }).catch(()=>{});
}
initCloud();
</script>
